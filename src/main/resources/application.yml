spring:
  application:
    name: dr-marut
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

info:
  app:
    name: Dr Marut
    description: Discord rules bot bootstrap for Pathfinder 2e.

drmarut:
  discord:
    enabled: ${DRMARUT_DISCORD_ENABLED:false}
    token: ${DRMARUT_DISCORD_TOKEN:}
    guild-id: ${DRMARUT_DISCORD_GUILD_ID:}
